<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Chess Against Computer</title>
    
    <!-- Official Stable Chessboard Layout Styles -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        #board {
            width: 400px;
            max-width: 95vw;
            margin: 20px auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background-color: #e0e0e0;
            min-height: 400px;
        }
    </style>
</head>
<body>

    <h1>Play Chess Against the Computer</h1>
    <p>You play as White. Drag and drop a piece to start!</p>
    
    <!-- The Visual Chessboard Container -->
    <div id="board">Loading chessboard layout...</div>

    <!-- Official, Secure JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <!-- Game Core Engine -->
    <script>
        // Double check that jQuery and Chessboard are loaded before building
        $(document).ready(function() {
            var board = null;
            var game = new Chess();

            function onDragStart(source, piece, position, orientation) {
                if (game.game_over() || game.turn() === 'b') return false;
                if (piece.search(/^b/) !== -1) return false;
            }

            function makeRandomMove() {
                var possibleMoves = game.moves();
                if (possibleMoves.length === 0) {
                    alert("Game Over!");
                    return;
                }
                var randomIdx = Math.floor(Math.random() * possibleMoves.length);
                game.move(possibleMoves[randomIdx]);
                board.position(game.fen());
            }

            function onDrop(source, target) {
                var move = game.move({
                    from: source,
                    to: target,
                    promotion: 'q'
                });

                if (move === null) return 'snapback';
                window.setTimeout(makeRandomMove, 250);
            }

            function onSnapEnd() {
                board.position(game.fen());
            }

            var config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                // Uses stable image rendering vectors hosted directly by the author
                pieceTheme: 'https://chessboardjs.com{piece}.png'
            };

            // Clear loading text and display the graphical board
            $('#board').html('');
            board = Chessboard('board', config);
        });
    </script>
</body>
</html>
